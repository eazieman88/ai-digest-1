<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#162216"/>
      <stop offset="100%" stop-color="#0e1a0e"/>
    </linearGradient>
    <linearGradient id="gld" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a94e"/>
      <stop offset="40%" stop-color="#8b7332"/>
      <stop offset="70%" stop-color="#c9a94e"/>
      <stop offset="100%" stop-color="#8b7332"/>
    </linearGradient>
    <pattern id="pin" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="4" y1="0" x2="4" y2="8" stroke="#c9a94e" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <filter id="amb">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#pin)"/>

  <!-- Warm ambient behind figure -->
  <ellipse cx="300" cy="330" rx="260" ry="300" fill="#c9a94e" opacity="0.018" filter="url(#amb)"/>

  <!-- Double frame -->
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="url(#gld)" stroke-width="1" opacity="0.35"/>
  <rect x="38" y="38" width="1124" height="554" fill="none" stroke="url(#gld)" stroke-width="0.4" opacity="0.2"/>

  <!-- Corner filigree — banknote style curves -->
  <!-- TL -->
  <path d="M30,75 Q30,30 75,30" fill="none" stroke="url(#gld)" stroke-width="0.7" opacity="0.22"/>
  <path d="M30,92 Q30,44 92,44 L92,30" fill="none" stroke="url(#gld)" stroke-width="0.5" opacity="0.15"/>
  <circle cx="48" cy="48" r="2.5" fill="url(#gld)" opacity="0.2"/>
  <!-- TR -->
  <path d="M1170,75 Q1170,30 1125,30" fill="none" stroke="url(#gld)" stroke-width="0.7" opacity="0.22"/>
  <path d="M1170,92 Q1170,44 1108,44 L1108,30" fill="none" stroke="url(#gld)" stroke-width="0.5" opacity="0.15"/>
  <circle cx="1152" cy="48" r="2.5" fill="url(#gld)" opacity="0.2"/>
  <!-- BL -->
  <path d="M30,555 Q30,600 75,600" fill="none" stroke="url(#gld)" stroke-width="0.7" opacity="0.22"/>
  <path d="M30,538 Q30,586 92,586 L92,600" fill="none" stroke="url(#gld)" stroke-width="0.5" opacity="0.15"/>
  <circle cx="48" cy="582" r="2.5" fill="url(#gld)" opacity="0.2"/>
  <!-- BR -->
  <path d="M1170,555 Q1170,600 1125,600" fill="none" stroke="url(#gld)" stroke-width="0.7" opacity="0.22"/>
  <path d="M1170,538 Q1170,586 1108,586 L1108,600" fill="none" stroke="url(#gld)" stroke-width="0.5" opacity="0.15"/>
  <circle cx="1152" cy="582" r="2.5" fill="url(#gld)" opacity="0.2"/>

  <!-- Candlestick chart — barely visible, like wallpaper -->
  <g opacity="0.13">
    <!-- Grid -->
    <g stroke="#c9a94e" stroke-width="0.25" opacity="0.4">
      <line x1="560" y1="140" x2="1140" y2="140"/>
      <line x1="560" y1="230" x2="1140" y2="230"/>
      <line x1="560" y1="320" x2="1140" y2="320"/>
      <line x1="560" y1="410" x2="1140" y2="410"/>
      <line x1="560" y1="500" x2="1140" y2="500"/>
    </g>
    <!-- Green candles -->
    <g fill="#5a8a5a" stroke="#5a8a5a">
      <line x1="607" y1="365" x2="607" y2="420" stroke-width="1.2"/>
      <rect x="600" y="375" width="14" height="35" rx="1"/>

      <line x1="667" y1="320" x2="667" y2="390" stroke-width="1.2"/>
      <rect x="660" y="330" width="14" height="45" rx="1"/>

      <line x1="787" y1="265" x2="787" y2="330" stroke-width="1.2"/>
      <rect x="780" y="275" width="14" height="40" rx="1"/>

      <line x1="907" y1="220" x2="907" y2="295" stroke-width="1.2"/>
      <rect x="900" y="232" width="14" height="48" rx="1"/>

      <line x1="1027" y1="180" x2="1027" y2="255" stroke-width="1.2"/>
      <rect x="1020" y="192" width="14" height="48" rx="1"/>

      <line x1="1087" y1="155" x2="1087" y2="220" stroke-width="1.2"/>
      <rect x="1080" y="165" width="14" height="40" rx="1"/>
    </g>
    <!-- Burgundy candles -->
    <g fill="#8a5a5a" stroke="#8a5a5a">
      <line x1="727" y1="300" x2="727" y2="360" stroke-width="1.2"/>
      <rect x="720" y="312" width="14" height="38" rx="1"/>

      <line x1="847" y1="258" x2="847" y2="315" stroke-width="1.2"/>
      <rect x="840" y="268" width="14" height="34" rx="1"/>

      <line x1="967" y1="215" x2="967" y2="270" stroke-width="1.2"/>
      <rect x="960" y="225" width="14" height="34" rx="1"/>
    </g>
  </g>

  <!-- ===== SILHOUETTE ===== -->
  <g transform="translate(70, 14)">
    <g fill="#0a120a">
      <!-- Top hat — tall, formal -->
      <ellipse cx="255" cy="122" rx="70" ry="10"/>
      <rect x="202" y="22" width="106" height="103" rx="2"/>
      <ellipse cx="255" cy="24" rx="53" ry="6"/>
      <!-- Hat band -->
      <rect x="202" y="102" width="106" height="9" fill="url(#gld)" opacity="0.7"/>
      <!-- Hat band edge line -->
      <line x1="202" y1="111" x2="308" y2="111" stroke="url(#gld)" stroke-width="0.6" opacity="0.5"/>

      <!-- Head -->
      <ellipse cx="255" cy="155" rx="34" ry="40"/>

      <!-- Monocle -->
      <circle cx="274" cy="150" r="12" fill="none" stroke="url(#gld)" stroke-width="2" opacity="0.75"/>
      <!-- Monocle glint -->
      <circle cx="269" cy="145" r="2.5" fill="#c9a94e" opacity="0.2"/>
      <!-- Chain drooping to waistcoat -->
      <path d="M284,154 Q305,180 290,230 Q280,255 265,270" fill="none" stroke="url(#gld)" stroke-width="1" opacity="0.5"/>

      <!-- Neck -->
      <rect x="241" y="192" width="28" height="16"/>

      <!-- Ascot tie -->
      <path d="M237,208 L255,224 L273,208 L265,212 L255,218 L245,212 Z" fill="url(#gld)" opacity="0.35"/>
      <circle cx="255" cy="216" r="2.5" fill="url(#gld)" opacity="0.25"/>

      <!-- Torso — three-piece suit -->
      <path d="M192,215 Q186,240 180,300 L178,410 Q176,430 196,434 L212,434 L222,370 L255,374 L288,370 L298,434 L314,434 Q334,430 332,410 L330,300 Q324,240 318,215 Z"/>

      <!-- Waistcoat V-opening -->
      <path d="M232,218 L255,308 L278,218" fill="#0e1a0e" stroke="url(#gld)" stroke-width="0.5" opacity="0.18"/>

      <!-- Waistcoat buttons -->
      <circle cx="255" cy="248" r="1.8" fill="url(#gld)" opacity="0.18"/>
      <circle cx="255" cy="268" r="1.8" fill="url(#gld)" opacity="0.18"/>
      <circle cx="255" cy="288" r="1.8" fill="url(#gld)" opacity="0.18"/>

      <!-- Pocket watch chain across waistcoat -->
      <path d="M238,265 Q228,278 232,295 Q238,308 255,302" fill="none" stroke="url(#gld)" stroke-width="0.7" opacity="0.25"/>

      <!-- Breast pocket square -->
      <path d="M280,255 L284,242 L294,248 L290,260 Z" fill="url(#gld)" opacity="0.3"/>

      <!-- Left arm — holding cane -->
      <path d="M180,245 Q148,290 136,350 L132,380 Q128,392 134,400 L144,400 Q148,392 146,380 L150,350 Q160,300 180,265"/>

      <!-- Right arm — at side, hand near pocket -->
      <path d="M332,245 Q354,285 358,335 L336,345 Q332,335 334,315 Q340,285 332,260"/>

      <!-- Trousers -->
      <path d="M212,430 L202,560 L218,564 L250,440 L260,440 L292,564 L308,560 L298,430 Z"/>
      <!-- Creases -->
      <line x1="225" y1="438" x2="210" y2="560" stroke="#162216" stroke-width="0.4" opacity="0.25"/>
      <line x1="285" y1="438" x2="300" y2="560" stroke="#162216" stroke-width="0.4" opacity="0.25"/>

      <!-- Oxford shoes -->
      <path d="M197,558 Q192,570 197,574 L224,574 Q228,570 224,562 Z"/>
      <path d="M286,562 Q282,570 286,574 L313,574 Q318,570 313,558 Z"/>
      <line x1="202" y1="568" x2="220" y2="568" stroke="url(#gld)" stroke-width="0.4" opacity="0.12"/>
      <line x1="290" y1="568" x2="310" y2="568" stroke="url(#gld)" stroke-width="0.4" opacity="0.12"/>
    </g>

    <!-- Walking cane — ebony shaft, gold derby handle -->
    <line x1="138" y1="385" x2="120" y2="572" stroke="#1a0e08" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="121" y1="564" x2="120" y2="574" stroke="url(#gld)" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="138" y1="385" x2="166" y2="381" stroke="url(#gld)" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
    <circle cx="166" cy="381" r="3.5" fill="url(#gld)" opacity="0.35"/>
  </g>

  <!-- ===== TEXT ===== -->

  <!-- FINANCIAL DIGEST -->
  <text x="600" y="168" fill="url(#gld)" font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
        font-size="12" letter-spacing="6" opacity="0.35">FINANCIAL DIGEST</text>

  <!-- Main title -->
  <text x="600" y="238" fill="url(#gld)" font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
        font-size="58" font-weight="bold" letter-spacing="2" font-style="italic">Биржевой</text>
  <text x="600" y="310" fill="url(#gld)" font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
        font-size="58" font-weight="bold" letter-spacing="2" font-style="italic">Дэнди</text>

  <!-- Double divider with center dot -->
  <line x1="600" y1="330" x2="800" y2="330" stroke="url(#gld)" stroke-width="0.7" opacity="0.28"/>
  <circle cx="700" cy="330" r="2" fill="url(#gld)" opacity="0.28"/>
  <line x1="600" y1="334" x2="800" y2="334" stroke="url(#gld)" stroke-width="0.3" opacity="0.18"/>

  <!-- BOURSE DANDY -->
  <text x="600" y="362" fill="url(#gld)" font-family="Georgia, 'Palatino Linotype', serif"
        font-size="15" letter-spacing="5" opacity="0.35">BOURSE DANDY</text>

  <!-- Tagline -->
  <text x="600" y="404" fill="#d4c9a8" font-family="Georgia, 'Palatino Linotype', serif"
        font-size="18" opacity="0.45" font-style="italic">Расчёт. Позиция. Результат.</text>

  <!-- Tags -->
  <text x="600" y="450" fill="#d4c9a8" font-family="Georgia, serif" font-size="12" opacity="0.2"
        >Order Flow  ·  Volume Profile  ·  Макроаналитика</text>
  <text x="600" y="472" fill="#d4c9a8" font-family="Georgia, serif" font-size="12" opacity="0.2"
        >Акции  ·  Фьючерсы  ·  Крипта  ·  Forex  ·  Commodities</text>

  <!-- EST -->
  <text x="600" y="524" fill="url(#gld)" font-family="Georgia, serif"
        font-size="10" letter-spacing="3" opacity="0.2">EST. MMXXVI</text>

  <!-- Bottom line -->
  <line x1="60" y1="590" x2="1140" y2="590" stroke="url(#gld)" stroke-width="0.25" opacity="0.12"/>
</svg>
