<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gld" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a94e"/>
      <stop offset="40%" stop-color="#8b7332"/>
      <stop offset="70%" stop-color="#c9a94e"/>
      <stop offset="100%" stop-color="#8b7332"/>
    </linearGradient>
    <linearGradient id="gldB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4b85a"/>
      <stop offset="50%" stop-color="#c9a94e"/>
      <stop offset="100%" stop-color="#d4b85a"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2e1f"/>
      <stop offset="100%" stop-color="#152015"/>
    </linearGradient>
    <!-- Shield clip for internal elements -->
    <clipPath id="sc">
      <path d="M256,28 L432,105 L432,300 Q432,430 256,492 Q80,430 80,300 L80,105 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0e1a0e"/>

  <!-- ===== LAUREL BRANCHES ===== -->
  <!-- Left branch -->
  <g fill="none" stroke="url(#gld)" stroke-width="1.2" opacity="0.35">
    <path d="M76,310 Q52,265 60,200 Q56,175 62,148"/>
    <path d="M65,185 Q48,180 44,164" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
    <path d="M68,208 Q50,206 44,192" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
    <path d="M72,232 Q54,232 46,218" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
    <path d="M74,256 Q58,258 48,248" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
    <path d="M76,278 Q62,282 52,272" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
    <path d="M76,300 Q64,305 56,296" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
  </g>
  <!-- Right branch -->
  <g fill="none" stroke="url(#gld)" stroke-width="1.2" opacity="0.35">
    <path d="M436,310 Q460,265 452,200 Q456,175 450,148"/>
    <path d="M447,185 Q464,180 468,164" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
    <path d="M444,208 Q462,206 468,192" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
    <path d="M440,232 Q458,232 466,218" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
    <path d="M438,256 Q454,258 464,248" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
    <path d="M436,278 Q450,282 460,272" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
    <path d="M436,300 Q448,305 456,296" fill="url(#gld)" fill-opacity="0.15" stroke-width="0.8"/>
  </g>

  <!-- ===== SHIELD ===== -->
  <!-- Shield fill -->
  <path d="M256,28 L432,105 L432,300 Q432,430 256,492 Q80,430 80,300 L80,105 Z"
        fill="url(#shieldFill)"/>
  <!-- Outer border — 3px -->
  <path d="M256,28 L432,105 L432,300 Q432,430 256,492 Q80,430 80,300 L80,105 Z"
        fill="none" stroke="url(#gld)" stroke-width="3"/>
  <!-- Inner border — 1px -->
  <path d="M256,44 L418,115 L418,296 Q418,418 256,476 Q94,418 94,296 L94,115 Z"
        fill="none" stroke="url(#gld)" stroke-width="1" opacity="0.4"/>

  <!-- ===== CROSSED CHARTS (behind monogram) ===== -->
  <g clip-path="url(#sc)" opacity="0.15">
    <!-- Bullish line -->
    <polyline points="120,380 170,360 220,370 256,340 300,320"
              fill="none" stroke="#5a8a5a" stroke-width="2" stroke-linecap="round"/>
    <!-- Bearish line -->
    <polyline points="210,320 250,345 300,330 340,360 390,385"
              fill="none" stroke="#8a5a5a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ===== HORIZONTAL DIVIDER ===== -->
  <line x1="115" y1="262" x2="397" y2="262" stroke="url(#gld)" stroke-width="0.8" opacity="0.3"/>

  <!-- ===== TOP HAT — upper half ===== -->
  <g>
    <!-- Hat brim -->
    <ellipse cx="256" cy="216" rx="88" ry="12" fill="#0e1a0e" stroke="url(#gldB)" stroke-width="2" opacity="1"/>
    <!-- Hat crown -->
    <rect x="194" y="112" width="124" height="107" rx="3" fill="#0e1a0e" stroke="url(#gldB)" stroke-width="2"/>
    <!-- Hat crown top -->
    <ellipse cx="256" cy="114" rx="62" ry="9" fill="#0e1a0e" stroke="url(#gldB)" stroke-width="1.5"/>

    <!-- Hat band — яркая золотая полоса -->
    <rect x="194" y="192" width="124" height="13" fill="url(#gldB)" opacity="0.8"/>
    <!-- Центральная линия на ленте -->
    <line x1="194" y1="199" x2="318" y2="199" stroke="#0e1a0e" stroke-width="0.8" opacity="0.35"/>
    <!-- Край ленты снизу -->
    <line x1="194" y1="205" x2="318" y2="205" stroke="#d4b85a" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- ===== MONOGRAM «БД» — lower half ===== -->
  <g font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', Palatino, serif" text-anchor="middle">
    <!-- Б — left, italic bold -->
    <text x="228" y="380" font-size="95" font-weight="bold" font-style="italic"
          fill="url(#gldB)" opacity="0.85">Б</text>
    <!-- Д — right, italic bold, overlapping -->
    <text x="284" y="380" font-size="95" font-weight="bold" font-style="italic"
          fill="url(#gldB)" opacity="0.85">Д</text>
  </g>

  <!-- Dot separator under monogram -->
  <circle cx="256" cy="405" r="3" fill="url(#gldB)" opacity="0.45"/>

  <!-- BOURSE DANDY -->
  <text x="256" y="436" fill="url(#gld)" font-family="Georgia, 'Palatino Linotype', serif"
        font-size="13" text-anchor="middle" letter-spacing="4" opacity="0.45">BOURSE DANDY</text>

  <!-- EST. MMXXVI -->
  <text x="256" y="458" fill="url(#gld)" font-family="Georgia, 'Palatino Linotype', serif"
        font-size="10" text-anchor="middle" letter-spacing="3" opacity="0.3">EST. MMXXVI</text>
</svg>
