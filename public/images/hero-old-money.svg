<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="omhBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b2a1b"/>
      <stop offset="50%" stop-color="#162216"/>
      <stop offset="100%" stop-color="#0e1a0e"/>
    </linearGradient>
    <linearGradient id="omhGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a94e"/>
      <stop offset="30%" stop-color="#8b7332"/>
      <stop offset="60%" stop-color="#c9a94e"/>
      <stop offset="100%" stop-color="#7a6428"/>
    </linearGradient>
    <linearGradient id="omhWarm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a94e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a94e" stop-opacity="0"/>
    </linearGradient>
    <filter id="omhShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="omhSoft">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="omhGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
    <clipPath id="omhFrame">
      <rect x="0" y="0" width="1200" height="630"/>
    </clipPath>
    <!-- Pinstripe pattern -->
    <pattern id="pinstripe" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="4" y1="0" x2="4" y2="8" stroke="#c9a94e" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background — deep hunter green -->
  <rect width="1200" height="630" fill="url(#omhBg)"/>

  <!-- Pinstripe texture overlay -->
  <rect width="1200" height="630" fill="url(#pinstripe)"/>

  <!-- Warm vignette glow -->
  <ellipse cx="350" cy="315" rx="400" ry="300" fill="#c9a94e" opacity="0.025" filter="url(#omhSoft)"/>

  <!-- Thin gold border — like a certificate -->
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="url(#omhGold)" stroke-width="1" opacity="0.35"/>
  <rect x="38" y="38" width="1124" height="554" fill="none" stroke="url(#omhGold)" stroke-width="0.4" opacity="0.2"/>

  <!-- Corner filigree — top left -->
  <g stroke="url(#omhGold)" fill="none" stroke-width="0.8" opacity="0.25">
    <path d="M30,70 Q30,30 70,30"/>
    <path d="M30,90 Q30,42 90,42 L90,30"/>
    <circle cx="50" cy="50" r="3" fill="url(#omhGold)"/>
  </g>
  <!-- Corner filigree — top right -->
  <g stroke="url(#omhGold)" fill="none" stroke-width="0.8" opacity="0.25">
    <path d="M1170,70 Q1170,30 1130,30"/>
    <path d="M1170,90 Q1170,42 1110,42 L1110,30"/>
    <circle cx="1150" cy="50" r="3" fill="url(#omhGold)"/>
  </g>
  <!-- Corner filigree — bottom left -->
  <g stroke="url(#omhGold)" fill="none" stroke-width="0.8" opacity="0.25">
    <path d="M30,560 Q30,600 70,600"/>
    <path d="M30,540 Q30,588 90,588 L90,600"/>
    <circle cx="50" cy="580" r="3" fill="url(#omhGold)"/>
  </g>
  <!-- Corner filigree — bottom right -->
  <g stroke="url(#omhGold)" fill="none" stroke-width="0.8" opacity="0.25">
    <path d="M1170,560 Q1170,600 1130,600"/>
    <path d="M1170,540 Q1170,588 1110,588 L1110,600"/>
    <circle cx="1150" cy="580" r="3" fill="url(#omhGold)"/>
  </g>

  <!-- Subdued candlestick chart — like wallpaper in a study -->
  <g opacity="0.08" clip-path="url(#omhFrame)">
    <!-- Horizontal grid -->
    <g stroke="#c9a94e" stroke-width="0.3">
      <line x1="550" y1="150" x2="1150" y2="150"/>
      <line x1="550" y1="250" x2="1150" y2="250"/>
      <line x1="550" y1="350" x2="1150" y2="350"/>
      <line x1="550" y1="450" x2="1150" y2="450"/>
    </g>
    <!-- Candles — muted green/burgundy -->
    <g>
      <!-- Green candles -->
      <rect x="590" y="380" width="14" height="40" fill="#5a8a5a"/>
      <line x1="597" y1="370" x2="597" y2="430" stroke="#5a8a5a" stroke-width="1.5"/>

      <rect x="650" y="340" width="14" height="50" fill="#5a8a5a"/>
      <line x1="657" y1="325" x2="657" y2="400" stroke="#5a8a5a" stroke-width="1.5"/>

      <rect x="770" y="280" width="14" height="45" fill="#5a8a5a"/>
      <line x1="777" y1="265" x2="777" y2="335" stroke="#5a8a5a" stroke-width="1.5"/>

      <rect x="890" y="240" width="14" height="50" fill="#5a8a5a"/>
      <line x1="897" y1="220" x2="897" y2="300" stroke="#5a8a5a" stroke-width="1.5"/>

      <rect x="1010" y="200" width="14" height="55" fill="#5a8a5a"/>
      <line x1="1017" y1="180" x2="1017" y2="265" stroke="#5a8a5a" stroke-width="1.5"/>

      <rect x="1070" y="170" width="14" height="45" fill="#5a8a5a"/>
      <line x1="1077" y1="155" x2="1077" y2="225" stroke="#5a8a5a" stroke-width="1.5"/>

      <!-- Burgundy candles -->
      <rect x="710" y="310" width="14" height="40" fill="#8a5a5a"/>
      <line x1="717" y1="300" x2="717" y2="360" stroke="#8a5a5a" stroke-width="1.5"/>

      <rect x="830" y="270" width="14" height="35" fill="#8a5a5a"/>
      <line x1="837" y1="260" x2="837" y2="315" stroke="#8a5a5a" stroke-width="1.5"/>

      <rect x="950" y="230" width="14" height="40" fill="#8a5a5a"/>
      <line x1="957" y1="218" x2="957" y2="280" stroke="#8a5a5a" stroke-width="1.5"/>

      <rect x="1130" y="190" width="14" height="35" fill="#8a5a5a"/>
      <line x1="1137" y1="180" x2="1137" y2="235" stroke="#8a5a5a" stroke-width="1.5"/>
    </g>
  </g>

  <!-- ===== DANDY SILHOUETTE — Old Money style ===== -->
  <g transform="translate(60, 20)">
    <!-- Warm ambient glow -->
    <ellipse cx="260" cy="320" rx="200" ry="280" fill="#c9a94e" opacity="0.02" filter="url(#omhSoft)"/>

    <!-- Full body silhouette — dark, almost shadow -->
    <g fill="#0a120a">
      <!-- TOP HAT — taller, more formal -->
      <ellipse cx="260" cy="130" rx="72" ry="11"/>
      <rect x="205" y="28" width="110" height="105" rx="3"/>
      <ellipse cx="260" cy="30" rx="55" ry="7"/>
      <!-- Hat band — thin gold -->
      <rect x="205" y="110" width="110" height="10" fill="url(#omhGold)" opacity="0.5"/>

      <!-- HEAD -->
      <ellipse cx="260" cy="162" rx="36" ry="42"/>

      <!-- MONOCLE -->
      <circle cx="280" cy="158" r="12" fill="none" stroke="url(#omhGold)" stroke-width="1.5" opacity="0.6"/>
      <path d="M 291,162 Q 312,188 296,240" fill="none" stroke="url(#omhGold)" stroke-width="0.8" opacity="0.35"/>

      <!-- NECK -->
      <rect x="244" y="200" width="32" height="18"/>

      <!-- CRAVAT / ASCOT TIE — old money style -->
      <path d="M 240,218 L 260,235 L 280,218 L 270,222 L 260,228 L 250,222 Z" fill="url(#omhGold)" opacity="0.4"/>
      <circle cx="260" cy="225" r="3" fill="url(#omhGold)" opacity="0.3"/>

      <!-- TORSO — three-piece suit, broader shoulders -->
      <!-- Jacket -->
      <path d="M 195,225 Q 188,250 182,310 L 180,420 Q 178,438 198,442 L 215,442 L 225,375 L 260,380 L 295,375 L 305,442 L 322,442 Q 342,438 340,420 L 338,310 Q 332,250 325,225 Z"/>

      <!-- Waistcoat visible in V -->
      <path d="M 235,228 L 260,320 L 285,228" fill="#0e1a0e" stroke="url(#omhGold)" stroke-width="0.6" opacity="0.2"/>

      <!-- Waistcoat buttons -->
      <circle cx="260" cy="260" r="2" fill="url(#omhGold)" opacity="0.2"/>
      <circle cx="260" cy="280" r="2" fill="url(#omhGold)" opacity="0.2"/>
      <circle cx="260" cy="300" r="2" fill="url(#omhGold)" opacity="0.2"/>

      <!-- Breast pocket with square -->
      <path d="M 285,262 L 290,248 L 300,254 L 296,266 Z" fill="url(#omhGold)" opacity="0.3"/>

      <!-- LEFT ARM — holding cane, slightly bent -->
      <path d="M 182,250 Q 150,295 138,355 L 134,385 Q 130,398 136,405 L 146,405 Q 150,398 148,385 L 152,355 Q 160,305 182,270"/>

      <!-- RIGHT ARM — hand in jacket pocket -->
      <path d="M 338,250 Q 358,290 362,340 L 340,350 Q 335,340 338,320 Q 345,290 338,265"/>

      <!-- TROUSERS — with crease -->
      <path d="M 215,438 L 205,568 L 222,572 L 252,448 L 268,448 L 298,572 L 315,568 L 305,438 Z"/>
      <!-- Crease lines -->
      <line x1="228" y1="445" x2="213" y2="568" stroke="#1b2a1b" stroke-width="0.5" opacity="0.3"/>
      <line x1="292" y1="445" x2="307" y2="568" stroke="#1b2a1b" stroke-width="0.5" opacity="0.3"/>

      <!-- OXFORD SHOES -->
      <path d="M 200,566 Q 194,578 200,582 L 228,582 Q 234,578 228,570 Z"/>
      <path d="M 292,570 Q 286,578 292,582 L 320,582 Q 326,578 320,566 Z"/>
      <!-- Shoe details -->
      <line x1="206" y1="576" x2="224" y2="576" stroke="url(#omhGold)" stroke-width="0.5" opacity="0.15"/>
      <line x1="296" y1="576" x2="316" y2="576" stroke="url(#omhGold)" stroke-width="0.5" opacity="0.15"/>
    </g>

    <!-- WALKING CANE — ebony with gold handle -->
    <g>
      <line x1="140" y1="390" x2="122" y2="578" stroke="#2a1a0a" stroke-width="4" stroke-linecap="round"/>
      <!-- Gold ferrule (tip) -->
      <line x1="123" y1="570" x2="122" y2="580" stroke="url(#omhGold)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
      <!-- Gold handle — derby style (straight, not curved) -->
      <line x1="140" y1="390" x2="170" y2="386" stroke="url(#omhGold)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <circle cx="170" cy="386" r="4" fill="url(#omhGold)" opacity="0.4"/>
    </g>

    <!-- POCKET WATCH CHAIN — across waistcoat -->
    <path d="M 240,278 Q 230,290 235,305 Q 242,315 260,310"
          fill="none" stroke="url(#omhGold)" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- ===== TEXT BLOCK — Right side, understated elegance ===== -->
  <g>
    <!-- Small caps label above title -->
    <text x="600" y="165" fill="url(#omhGold)" font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
          font-size="12" letter-spacing="6" opacity="0.35">FINANCIAL DIGEST</text>

    <!-- Main title — serif, elegant -->
    <text x="600" y="230" fill="url(#omhGold)" font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
          font-size="58" font-weight="bold" letter-spacing="2" font-style="italic"
          filter="url(#omhShadow)">Биржевой</text>
    <text x="600" y="305" fill="url(#omhGold)" font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
          font-size="58" font-weight="bold" letter-spacing="2" font-style="italic"
          filter="url(#omhShadow)">Дэнди</text>

    <!-- Decorative divider — simple, refined -->
    <line x1="600" y1="325" x2="780" y2="325" stroke="url(#omhGold)" stroke-width="0.8" opacity="0.3"/>
    <circle cx="690" cy="325" r="2.5" fill="url(#omhGold)" opacity="0.3"/>
    <line x1="600" y1="328" x2="780" y2="328" stroke="url(#omhGold)" stroke-width="0.3" opacity="0.2"/>

    <!-- Subtitle -->
    <text x="600" y="358" fill="url(#omhGold)" font-family="Georgia, 'Palatino Linotype', serif"
          font-size="15" letter-spacing="5" opacity="0.35">BOURSE DANDY</text>

    <!-- Tagline — understated -->
    <text x="600" y="400" fill="#d4c9a8" font-family="Georgia, 'Palatino Linotype', serif"
          font-size="18" opacity="0.45" font-style="italic">Элегантно о рынках</text>

    <!-- Tags — typewriter style, very subtle -->
    <g fill="#d4c9a8" font-family="Georgia, serif" font-size="12" opacity="0.2">
      <text x="600" y="445">Order Flow  ·  Volume Profile  ·  Макроаналитика</text>
      <text x="600" y="468">Акции  ·  Фьючерсы  ·  Крипта  ·  Forex  ·  Commodities</text>
    </g>

    <!-- EST line -->
    <text x="600" y="520" fill="url(#omhGold)" font-family="Georgia, serif"
          font-size="10" letter-spacing="3" opacity="0.2">EST. MMXXVI</text>
  </g>

  <!-- Bottom decorative line -->
  <line x1="60" y1="590" x2="1140" y2="590" stroke="url(#omhGold)" stroke-width="0.3" opacity="0.15"/>
</svg>
